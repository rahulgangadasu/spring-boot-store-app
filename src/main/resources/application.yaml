spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: store-app
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/store?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    show-sql: true
  jwt:
    secret: ${JWT_SECRET:secret}
